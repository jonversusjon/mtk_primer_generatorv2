<div class="sequence-tabs">
    <!-- Tab Navigation -->
    <div class="sequence-tabs-nav">
      {% for i in range(num_sequences) %}
      <button type="button"
              class="sequence-tab-btn {% if i == 0 %}active{% endif %}"
              data-tab-index="{{ i }}">
        Sequence {{ i + 1 }}
      </button>
      {% endfor %}
    </div>
  
    <!-- Tab Content -->
    <div class="sequence-tabs-content">
      {% for i in range(num_sequences) %}
      <div class="sequence-tab-content {% if i == 0 %}active{% endif %}"
           data-tab-index="{{ i }}">
        <div class="sequence-tab-wrapper">
          <div class="dropdown-container form-header-container">
            <!-- Primer Name Input Group -->
            <div class="dropdown-item form-group col-large">
              <label for="primerName{{ i }}" class="form-label">Primer Name:</label>
              <input type="text" 
                     id="primerName{{ i }}" 
                     name="sequences[{{ i }}][primerName]" 
                     class="form-control input-field"
                     placeholder="Enter primer name (optional)"
                     value="{{ test_primer_name[i] if test_primer_name is defined and test_primer_name|length > i else '' }}"
                     hx-post="{{ url_for('main.validate_field') }}"
                     hx-trigger="change, keyup changed delay:500ms"
                     hx-target="closest div"
                     data-sequence-index="{{ i }}"
                     hx-vals='{"field": "primerName", "sequenceIndex": {{ i }}}' />
              <div class="error-message" data-field="primerName"></div>
            </div>
  
            <!-- MTK Part Number Input Group -->
            <div class="dropdown-item form-group">
              <label for="mtkPart{{ i }}" class="form-label">MTK Part Number:</label>
              <select id="mtkPart{{ i }}" 
                      name="sequences[{{ i }}][mtkPart]" 
                      class="form-select input-field"
                      hx-post="{{ url_for('main.validate_field') }}"
                      hx-trigger="change"
                      hx-target="closest div"
                      data-sequence-index="{{ i }}"
                      hx-vals='{"field": "mtkPart", "sequenceIndex": {{ i }}}'>
                {% for val in mtk_part_nums %}
                <option value="{{ val }}"
                        {% if test_part_number is defined and test_part_number|length > i and test_part_number[i] == val %}selected{% endif %}>
                  {{ val }}
                </option>
                {% endfor %}
              </select>
              <div class="error-message" data-field="mtkPart"></div>
            </div>
          </div>
  
          <!-- Sequence Input -->
          <div class="form-group">
            <label class="form-label">Sequence {{ i + 1 }}:</label>
            <textarea id="sequence{{ i }}" 
                      name="sequences[{{ i }}][sequence]" 
                      data-sequence-index="{{ i }}"
                      class="form-control dynamic-sequence-input sequence-input input-field"
                      placeholder="Enter DNA sequence..."
                      hx-post="{{ url_for('main.validate_field') }}"
                      hx-trigger="change, keyup changed delay:1000ms"
                      hx-target="closest div"
                      hx-vals='{"field": "sequence", "sequenceIndex": {{ i }}}'>{{ test_sequence if test_sequence is defined else '' }}</textarea>
            <div class="error-message" data-field="sequence"></div>
            <div class="char-count-label" style="display:none;"></div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
