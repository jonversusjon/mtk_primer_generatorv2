{% set mtk_part_nums = [
  '', '1', '2', '3', '3a', '3b', '3c', '3d', '3e', '3f',
  '3g', '4', '4a', '4b', '4aII', '3bI', '3bII', '5', '6', '7', '8', '8a', '8b'
] %}
{% for i in range(num_sequences) %}
<div class="sequence-tab-wrapper">
<div class="form-row-top">
  <div class="input-group">
    <label for="primerName{{ i }}">Primer Name:</label>
    <input type="text" id="primerName{{ i }}" name="sequences[{{ i }}][primerName]" class="form-control"
           placeholder="Enter primer name (optional)"
           value="{{ test_primer_name[i] if test_primer_name is defined and test_primer_name|length > i else '' }}" />
  </div>
  <div class="input-group">
    <label for="mtkPart{{ i }}">MTK Part Number:</label>
    <select id="mtkPart{{ i }}" name="sequences[{{ i }}][mtkPart]" class="form-select">
      {% for val in mtk_part_nums %}
        <option value="{{ val }}"
          {% if test_part_number is defined and test_part_number|length > i and test_part_number[i] == val %}selected{% endif %}>
          {{ val }}
        </option>
      {% endfor %}
    </select>
  </div>
</div>

<label>Sequence {{ i + 1 }}:</label>
<textarea id="sequence{{ i }}" name="sequences[{{ i }}][sequence]" 
          class="form-control dynamic-sequence-input sequence-input"
          placeholder="Enter DNA sequence...">{{ test_sequence if test_sequence is defined else '' }}</textarea>

<!-- ✅ NEW: Add a validation message container immediately after each input -->
<div class="validation-message" id="sequence{{ i }}-validation" style="color: red;"></div>

<div class="char-count-label" style="display:none;"></div>
</div>
{% endfor %}
