<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTK Primers</title>

  <!-- HTMX + JSON Encoding Extension -->
  <script src="https://unpkg.com/htmx.org@1.9.6"></script>
  <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>

  <!-- Styles & Icons -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico?v=2') }}">

  <!-- Pass server data to JS -->
  <script type="application/json" id="testing-mode-data">{{ testing_mode | tojson }}</script>
  <script type="application/json" id="test-template-seq-data">{{ test_template_seq | tojson }}</script>

  <!-- Initialize APP_STATE -->
  <script>
    const APP_STATE = {
      testSeq: [],  // Test sequences handled dynamically
      testTemplateSeq: JSON.parse(document.getElementById("test-template-seq-data").textContent || "\"\""),
      testingMode: JSON.parse(document.getElementById("testing-mode-data").textContent || "false")
    };

    console.log("APP_STATE initialized:", APP_STATE);
  </script>

  <!-- External JavaScript -->
  <script defer src="{{ url_for('static', filename='js/dom.js') }}"></script>
  <script defer type="module" src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
  <script defer src="{{ url_for('static', filename='js/validation.js') }}"></script>
  <script defer src="{{ url_for('static', filename='js/formSubmission.js') }}"></script>
  <script defer src="{{ url_for('static', filename='js/utils.js') }}"></script>
</head>

<body>
  <!-- Settings Toggle Button -->
  <button id="toggle-settings" class="fixed top-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-md">
    ⚙️ Settings
  </button>
  <!-- Parent container to hold form and results side by side -->
  <h1 class="app-title">Mammalian Toolkit Domestication Primer Design</h1>

  <div class="app-container" style="display: flex; gap: 6px; height: 100vh; padding: 20px;">

    <!-- Header -->
    <div class="form-container">
      <form id="primer-form" hx-post="{{ url_for('main.generate_protocol') }}" hx-trigger="submit"
        hx-target="#results-container" hx-swap="innerHTML" hx-ext="json-enc">
        <!-- Floating Settings Card -->
        <div id="settings-card"
          class="fixed top-16 right-4 bg-white dark:bg-gray-900 shadow-lg rounded-lg p-4 w-96 hidden border border-gray-300 dark:border-gray-700">
          <h4 class="text-lg font-semibold mb-2">Settings</h4>
          <!-- Dark Mode Toggle -->
          <div class="dark-mode-toggle form-group-narrow">
            <button id="darkModeToggle" class="dark-mode-btn">
              <span class="moon-icon">🌙</span>
              <span class="button-text">Dark Mode</span>
            </button>
            <div class="form-group wide">
              <label for="species">Species:</label>
              <select id="species" name="species" class="form-select input-field">
                <option value="">Select species...</option>
                {% for s in available_species %}
                <option value="{{ s }}" {% if loop.first %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>


            <div class="form-group wide">
              <label for="kozak">Kozak:</label>
              <select id="kozak" name="kozak" class="form-select input-field" hx-trigger="change">
                <option value="MTK" selected>MTK</option>
                <option value="Canonical">Canonical</option>
              </select>
            </div>

            <div class="form-group narrow">
              <label for="maxMutPerSite">Max mutations per site:</label>
              <select id="maxMutPerSite" name="max_mut_per_site" class="form-select input-field" hx-trigger="change">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </div>
            <div class="form-group narrow">
              <input type="checkbox" id="verbose_mode" name="verbose_mode">
              <label for="verbose_mode">Verbose</label>
            </div>

            <!-- Close Button -->
            <button id="close-settings" class="mt-4 bg-red-500 text-white px-3 py-1 rounded-md w-full">
              Close Settings
            </button>
          </div>
        </div>
        <div class="">
          <!-- Template Sequence Section -->
          <div class="form-sub-container">
            <h4 class="form-sub-container-title">Template Sequence (optional)</h4>

            <div class="tab-buttons">
              <button type="button" class="tab-button active" onclick="openTab('paste');">Paste Sequence</button>
              <button type="button" class="tab-button" onclick="openTab('upload');">Upload File</button>
            </div>

            <div class="tab-content">
              <div class="tab-pane active" id="paste">
                <label for="templateSequence">Paste Template Sequence:</label>
                <textarea id="templateSequence" name="templateSequence" class="form-control sequence-input input-field"
                  placeholder="Enter DNA sequence here..." hx-post="{{ url_for('main.validate_field') }}"
                  hx-trigger="keyup changed delay:1000ms" hx-target=".error-message"
                  value="{{ test_template_seq if testing_mode else '' }}"></textarea>
                <span class="char-count-label" style="display: none;">Length: 0 bp</span>

                <div class="error-message" data-field="templateSequence"></div>
              </div>
              <div class="tab-pane" id="upload">
                <label for="fileUpload">Upload DNA File:</label>
                <input type="file" id="fileUpload" name="fileUpload" class="form-control">
              </div>
            </div>
          </div>

          <div class="form-sub-container">
            <h4 class="form-sub-container-title">Sequences to Domesticate</h4>

            <div id="sequence-container" style="position: relative;">
              <!-- Control Buttons -->
              <div id="sequence-control-buttons">
                <button type="button" id="decrementBtn">–</button>
                <button type="button" id="incrementBtn">+</button>
              </div>

              <!-- Hidden input to store the current sequence count -->
              <input type="hidden" id="numSequencesInput" name="numSequences" value="{{ num_sequences }}">

              <!-- Display the value (optional) -->
              <span id="numDisplay">{{ num_sequences }}</span>
            </div>
          </div>


          <!-- Sequence Input Tabs -->
          <div id="sequence-inputs-container" hx-target="#sequence-inputs-container" hx-swap="innerHTML">
            <!-- This will be replaced dynamically -->
          </div>
        </div>

        <!-- Buttons -->
        <div class="button-container">
          <button type="submit" class="btn btn-primary" id="runDesignPrimerBtn">Generate Protocol</button>
          <button type="button" id="clearForm" class="btn btn-warning" onclick="clearForm()">Clear Form</button>
        </div>
      </form>
    </div>
    <!-- Results Section -->
    <div id="validation-results"></div>

    <!-- Main Results Section -->
    <div id="results-container" class="results-container">
      {% if results %}
      {% include 'results_partial.html' %}
      {% endif %}
    </div>

    <!-- Primer Anatomy Section -->
    <!-- CHANGE DISPLAY STYLE TO MAKE IT APPEAR -->
    <div class="primer-anatomy-container" style="display: none;">
      {% include 'primer_anatomy.html' %}
    </div>
  </div>
  <!-- HTMX-Based Toggle -->
  <script>
    document.getElementById("toggle-settings").addEventListener("click", function () {
      document.getElementById("settings-card").classList.toggle("hidden");
    });

    document.getElementById("close-settings").addEventListener("click", function () {
      document.getElementById("settings-card").classList.add("hidden");
    });
  </script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
